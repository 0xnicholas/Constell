services:
  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION}
    container_name: constell-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - constell_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - constell

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:${CLICKHOUSE_VERSION}
    container_name: constell-clickhouse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - constell_clickhouse_data:/var/lib/clickhouse
      - constell_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - constell

  redis:
    image: docker.io/redis:${REDIS_VERSION}
    container_name: constell-redis
    restart: always
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - constell

  minio:
    image: ${MINIO_IMAGE}
    container_name: constell-minio
    command: >
      server /data
      --address ':9000'
      --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9090}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9091}:9001"
    volumes:
      - constell_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
    networks:
      - constell

volumes:
  constell_postgres_data:
    driver: local
  constell_clickhouse_data:
    driver: local
  constell_clickhouse_logs:
    driver: local
  constell_minio_data:
    driver: local

networks:
  constell:
    driver: bridge
