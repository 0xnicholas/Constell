services:
  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-17}
    container_name: ${POSTGRES_CONTAINER_NAME:-constell-postgres}
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${HOST_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - constell_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 1s
    networks:
      - constell

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-25.12}
    container_name: ${CLICKHOUSE_CONTAINER_NAME:-constell-clickhouse}
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    ports:
      - "${HOST_IP:-127.0.0.1}:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${HOST_IP:-127.0.0.1}:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - constell_clickhouse_data:/var/lib/clickhouse
      - constell_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    depends_on:
      - postgres
    networks:
      - constell

  redis:
    image: docker.io/redis:${REDIS_VERSION:-8.0}
    container_name: ${REDIS_CONTAINER_NAME:-constell-redis}
    restart: always
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    ports:
      - "${HOST_IP:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - constell

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: ${MINIO_CONTAINER_NAME:-constell-minio}
    command: >
      server /data
      --address ':9000'
      --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "${HOST_IP:-127.0.0.1}:${MINIO_API_PORT:-9090}:9000"
      - "${HOST_IP:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9091}:9001"
    volumes:
      - constell_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    networks:
      - constell

volumes:
  constell_postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-constell_postgres_data}
    driver: local
  constell_clickhouse_data:
    name: ${CLICKHOUSE_DATA_VOLUME_NAME:-constell_clickhouse_data}
    driver: local
  constell_clickhouse_logs:
    name: ${CLICKHOUSE_LOGS_VOLUME_NAME:-constell_clickhouse_logs}
    driver: local
  constell_minio_data:
    name: ${MINIO_VOLUME_NAME:-constell_minio_data}
    driver: local

networks:
  constell:
    name: ${DOCKER_NETWORK_NAME:-constell-network}
    driver: bridge
